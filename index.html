<!doctype html>
<html lang="en">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
 <meta name="theme-color" content="#071A2B"/>
 <link rel="icon" type="image/png" href="/images/brand/kakani-logo-transparent.png"/>
 <link rel="apple-touch-icon" href="/images/brand/kakani-logo-transparent.png"/>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
 <link rel="preload" as="image" href="/images/brand/kakani-logo-transparent.png" fetchpriority="high">
 <style>
  #native-intro{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 45%,#103654 0,#071527 44%,#030711 82%);animation:introExit 2.2s cubic-bezier(.76,0,.24,1) forwards}
  #native-intro:before{content:"";position:absolute;width:min(90vw,760px);aspect-ratio:1;border:1px solid rgba(231,183,83,.18);border-radius:50%;box-shadow:0 0 90px rgba(25,151,167,.18),inset 0 0 90px rgba(25,151,167,.08);animation:orbitPulse 1.8s ease-out both}
  #native-intro:after{content:"";position:absolute;inset:-20%;background:linear-gradient(115deg,transparent 38%,rgba(255,224,155,.1) 48%,transparent 58%);transform:translateX(-60%);animation:lightPass 1.7s .25s ease-in-out both}
  .native-intro-logo{position:relative;z-index:3;width:min(84vw,620px);height:auto;filter:drop-shadow(0 14px 35px rgba(0,0,0,.28));transform:translateZ(0);backface-visibility:hidden;-webkit-backface-visibility:hidden;image-rendering:auto;animation:logoArrive 1.2s .4s cubic-bezier(.22,1,.36,1) both}
  .native-intro-plane{position:absolute;z-index:4;left:-12%;top:58%;color:#efbd56;font:700 clamp(24px,6vw,44px)/1 sans-serif;text-shadow:0 0 14px rgba(239,189,86,.8);animation:planeFlight 1.4s .08s cubic-bezier(.35,.04,.2,1) both}
  .native-intro-caption{position:absolute;z-index:3;bottom:max(7vh,34px);margin:0;color:rgba(237,207,143,.72);font:700 9px/1.4 Manrope,sans-serif;letter-spacing:.3em;text-transform:uppercase;animation:captionIn 1s .85s ease both}
  @keyframes planeFlight{0%{opacity:0;transform:translate3d(0,30px,0) rotate(-12deg) scale(.75)}15%{opacity:1}75%{opacity:1}100%{opacity:0;transform:translate3d(112vw,-32vh,0) rotate(-5deg) scale(1.05)}}
  @keyframes logoArrive{from{opacity:0;transform:translate3d(0,12px,0) scale(.94)}to{opacity:1;transform:translate3d(0,0,0) scale(1)}}
  @media(max-width:767px){.native-intro-logo{width:min(88vw,520px);filter:none;animation-duration:.9s}.native-intro-plane{text-shadow:none}}
  @supports (-webkit-touch-callout:none){
   #native-intro{background:#061b33;transform:translateZ(0);-webkit-transform:translateZ(0);animation:iphoneIntroExit 2s ease forwards}
   #native-intro:before,#native-intro:after{display:none}
   .native-intro-logo{width:88vw;max-width:520px;filter:none!important;-webkit-filter:none!important;transform:translateZ(0);animation:iphoneLogoIn .8s .18s ease-out both}
   .native-intro-plane{top:62%;animation:iphonePlane 1s .22s ease-in-out both;text-shadow:none}
   .native-intro-caption{bottom:max(32px,env(safe-area-inset-bottom));animation:captionIn .55s .65s ease both}
  }
  @keyframes iphoneLogoIn{from{opacity:0;transform:translate3d(0,8px,0) scale(.96)}to{opacity:1;transform:translate3d(0,0,0) scale(1)}}
  @keyframes iphonePlane{0%{opacity:0;transform:translate3d(0,15px,0) rotate(-8deg)}15%,75%{opacity:1}to{opacity:0;transform:translate3d(115vw,-18vh,0) rotate(-4deg)}}
  @keyframes iphoneIntroExit{0%,84%{opacity:1;visibility:visible;pointer-events:auto}to{opacity:0;visibility:hidden;pointer-events:none}}
  @keyframes orbitPulse{from{opacity:0;transform:scale(.7) rotate(-12deg)}55%{opacity:1}to{opacity:.35;transform:scale(1.08) rotate(5deg)}}
  @keyframes lightPass{to{transform:translateX(60%)}}
  @keyframes captionIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes introExit{0%,88%{opacity:1;visibility:visible;pointer-events:auto}to{opacity:0;visibility:hidden;pointer-events:none}}
  .native-mobile-panel{display:block;position:fixed;inset:0;z-index:500;overflow-y:auto;padding:0 1rem 2rem;color:#fff;background:radial-gradient(circle at 85% 10%,rgba(24,119,132,.28),transparent 32%),#071d33;opacity:0;visibility:hidden;pointer-events:none;transform:translate3d(100%,0,0);transition:transform .36s cubic-bezier(.22,1,.36,1),opacity .22s ease,visibility .36s}
  .native-mobile-panel.is-open{opacity:1;visibility:visible;pointer-events:auto;transform:translate3d(0,0,0)}
  .native-mobile-panel.is-open nav>a,.native-mobile-panel.is-open nav>details{animation:menuItemIn .38s ease both}
  .native-mobile-panel.is-open nav>:nth-child(2){animation-delay:.04s}.native-mobile-panel.is-open nav>:nth-child(3){animation-delay:.08s}.native-mobile-panel.is-open nav>:nth-child(4){animation-delay:.12s}.native-mobile-panel.is-open nav>:nth-child(5){animation-delay:.16s}.native-mobile-panel.is-open nav>:nth-child(6){animation-delay:.2s}
  @keyframes menuItemIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
  @media(min-width:1024px){.native-mobile-panel{display:none!important}}
  @media(prefers-reduced-motion:reduce){#native-intro{animation-duration:.15s}.native-intro-plane,.native-intro-logo,.native-intro-caption{animation:none}.native-mobile-panel{transition:none}}
 </style>
 <title>Kakani Holidays</title>
</head>
<body>
 <div id="native-intro" aria-hidden="true">
  <span class="native-intro-plane">✈</span>
  <img class="native-intro-logo" src="/images/brand/kakani-logo-transparent.png" alt=""/>
  <p class="native-intro-caption">Your world of journeys begins here</p>
 </div>
 <script>setTimeout(function(){var intro=document.getElementById('native-intro');if(intro)intro.remove()},2300)</script>
 <div id="root"></div>
 <script type="module" src="/src/main.tsx"></script>
</body>
</html>
